version: '3.8'

services:
  # Redis database for BullMQ queue
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Backend server
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-socialsell_fallback_secret_key_12345}
    depends_on:
      - redis
    restart: always

  # Frontend React client
  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: always

volumes:
  redis_data:
